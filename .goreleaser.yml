version: 2

project_name: meufoco

builds:
  - id: cli
    main: ./cmd/cli
    binary: meufoco
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: cli
    name_template: "meufoco-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: meufoco
    description: "Interface CLI em modo TUI para gerenciar tarefas, áreas, projetos e espaços de trabalho"
    homepage: "https://github.com/widia-io/widia-omni"
    binaries:
      - meufoco
    repository:
      owner: widia-io
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

scoops:
  - name: meufoco
    description: "Interface CLI em modo TUI para gerenciar tarefas, áreas, projetos e espaços de trabalho"
    homepage: "https://github.com/widia-io/widia-omni"
    repository:
      owner: widia-io
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

checksum:
  name_template: checksums.txt

dist: dist

release:
  draft: false
  prerelease: auto
  mode: replace

changelog:
  sort: desc
  filters:
    exclude:
      - '^docs\(cli\):'
      - '^chore\(cli\):'
