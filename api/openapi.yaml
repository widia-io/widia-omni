openapi: 3.1.0
info:
  title: Mission Control API
  description: Personal life management SaaS platform
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Auth
  - name: User
  - name: Workspace
  - name: Areas
  - name: Goals
  - name: Habits
  - name: Tasks
  - name: Billing
  - name: Onboarding
  - name: Journal
  - name: Scores
  - name: Notifications
  - name: Finances
  - name: Dashboard
  - name: Export
  - name: Referrals
  - name: Admin
  - name: Webhooks

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token
    serviceKeyAuth:
      type: apiKey
      in: header
      name: X-Service-Key
      description: Supabase service role key for admin endpoints

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
    offsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          type: object

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
        locale:
          type: string
        default_workspace_id:
          type: string
          format: uuid
          nullable: true
        onboarding_completed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserPreferences:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        week_starts_on:
          type: integer
        daily_focus_limit:
          type: integer
        notification_email:
          type: boolean
        notification_push:
          type: boolean
        weekly_review_day:
          type: integer
        weekly_review_time:
          type: string
        theme:
          type: string
        currency:
          type: string
        score_weights:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkspaceListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        is_default:
          type: boolean
        member_count:
          type: integer

    WorkspaceMemberSummary:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        display_name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        joined_at:
          type: string
          format: date-time

    WorkspaceInvite:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        invited_by:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        accepted_by:
          type: string
          format: uuid
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        revoked_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    WorkspaceInviteWithURL:
      type: object
      properties:
        invite_url:
          type: string
        invite:
          $ref: '#/components/schemas/WorkspaceInvite'

    WorkspaceUsage:
      type: object
      properties:
        counters:
          $ref: '#/components/schemas/WorkspaceCounters'
        limits:
          $ref: '#/components/schemas/EntitlementLimits'

    WorkspaceCounters:
      type: object
      properties:
        areas_count:
          type: integer
        goals_count:
          type: integer
        habits_count:
          type: integer
        members_count:
          type: integer
        tasks_created_today:
          type: integer
        transactions_month_count:
          type: integer
        storage_bytes_used:
          type: integer
          format: int64

    EntitlementLimits:
      type: object
      properties:
        max_areas:
          type: integer
        max_goals:
          type: integer
        max_habits:
          type: integer
        max_members:
          type: integer
        max_tasks_per_day:
          type: integer
        max_transactions_per_month:
          type: integer
        journal_enabled:
          type: boolean
        finance_enabled:
          type: boolean
        export_enabled:
          type: boolean
        family_enabled:
          type: boolean
        referral_enabled:
          type: boolean
        mobile_pwa_enabled:
          type: boolean
        score_history_weeks:
          type: integer
        api_rate_limit_per_minute:
          type: integer
        storage_mb:
          type: integer
        ai_insights:
          type: boolean
        api_access:
          type: boolean

    ReferralStats:
      type: object
      properties:
        pending:
          type: integer
        converted:
          type: integer
        expired:
          type: integer

    ReferralMe:
      type: object
      properties:
        code:
          type: string
        share_url:
          type: string
        stats:
          $ref: '#/components/schemas/ReferralStats'
        credit_days:
          type: integer
        has_available:
          type: boolean

    ReferralCode:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        code:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        regenerated_at:
          type: string
          format: date-time
          nullable: true

    ReferralAttribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        referral_code:
          type: string
        referrer_workspace_id:
          type: string
          format: uuid
        referred_workspace_id:
          type: string
          format: uuid
        referred_user_id:
          type: string
          format: uuid
          nullable: true
        expires_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, converted, expired]
        converted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ReferralCredit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        attribution_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        credit_type:
          type: string
        days:
          type: integer
        status:
          type: string
          enum: [available, consumed, expired]
        expires_at:
          type: string
          format: date-time
          nullable: true
        consumed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    LifeArea:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        icon:
          type: string
        color:
          type: string
        weight:
          type: number
        sort_order:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Goal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        area_id:
          type: string
          format: uuid
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        period:
          type: string
          enum: [yearly, quarterly, monthly, weekly]
        status:
          type: string
          enum: [not_started, on_track, at_risk, behind, completed, cancelled]
        target_value:
          type: number
          nullable: true
        current_value:
          type: number
        unit:
          type: string
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Habit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        area_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        color:
          type: string
        frequency:
          type: string
          enum: [daily, weekly, custom]
        target_per_week:
          type: integer
        is_active:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HabitEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        habit_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        intensity:
          type: integer
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    HabitStreak:
      type: object
      properties:
        habit_id:
          type: string
          format: uuid
        name:
          type: string
        current_streak:
          type: integer
        longest_streak:
          type: integer
        last_check_in:
          type: string
          nullable: true

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        area_id:
          type: string
          format: uuid
          nullable: true
        goal_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, medium, high, critical]
        is_completed:
          type: boolean
        is_focus:
          type: boolean
        due_date:
          type: string
          format: date
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    JournalEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        mood:
          type: integer
          nullable: true
        energy:
          type: integer
          nullable: true
        wins:
          type: array
          items:
            type: string
        challenges:
          type: array
          items:
            type: string
        gratitude:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LifeScore:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        score:
          type: integer
        week_start:
          type: string
          format: date
        area_scores:
          type: object
        created_at:
          type: string
          format: date-time

    AreaScore:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        area_id:
          type: string
          format: uuid
        score:
          type: integer
        week_start:
          type: string
          format: date
        breakdown:
          type: object
        created_at:
          type: string
          format: date-time

    ScoreHistory:
      type: object
      properties:
        life_scores:
          type: array
          items:
            $ref: '#/components/schemas/LifeScore'
        area_scores:
          type: array
          items:
            $ref: '#/components/schemas/AreaScore'

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [weekly_review, streak_at_risk, goal_deadline, trial_ending, plan_changed, score_update, habit_reminder, system]
        channel:
          type: string
          enum: [in_app, email, push]
        title:
          type: string
        body:
          type: string
          nullable: true
        data:
          type: object
        is_read:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tier:
          type: string
          enum: [free, pro, premium]
        name:
          type: string
        price_monthly:
          type: number
        price_yearly:
          type: number
        limits:
          $ref: '#/components/schemas/EntitlementLimits'
        is_active:
          type: boolean

    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        tier:
          type: string
        status:
          type: string
          enum: [trialing, active, past_due, canceled, paused, unpaid]
        currency:
          type: string
        current_period_start:
          type: string
          format: date-time
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        trial_end:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FinanceCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [income, expense, investment, transfer]
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        area_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [income, expense, investment, transfer]
        amount:
          type: number
        description:
          type: string
          nullable: true
        date:
          type: string
          format: date
        is_recurring:
          type: boolean
        recurrence_rule:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Budget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        month:
          type: string
        amount:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FinanceSummary:
      type: object
      properties:
        month:
          type: string
        total_income:
          type: number
        total_expenses:
          type: number
        total_investments:
          type: number
        net_balance:
          type: number
        by_category:
          type: array
          items:
            type: object
            properties:
              category_id:
                type: string
                format: uuid
                nullable: true
              category_name:
                type: string
                nullable: true
              type:
                type: string
              total:
                type: number
              count:
                type: integer
        budget_status:
          type: array
          items:
            type: object
            properties:
              category_id:
                type: string
                format: uuid
                nullable: true
              category_name:
                type: string
                nullable: true
              budget_amount:
                type: number
              spent_amount:
                type: number
              remaining:
                type: number
              percentage:
                type: number

    DashboardData:
      type: object
      properties:
        areas_count:
          type: integer
        active_goals:
          type: integer
        today_tasks:
          type: integer
        completed_today:
          type: integer
        habits_today:
          type: integer
        current_streaks:
          type: integer
        life_score:
          type: integer
          nullable: true
        journal_today:
          type: boolean
        unread_notifications:
          type: integer

    Entitlement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        tier:
          type: string
        limits:
          type: object
        source:
          type: string
          enum: [free, stripe, trial, promo, admin]
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
          nullable: true
        is_current:
          type: boolean
        created_at:
          type: string
          format: date-time

    AdminMetrics:
      type: object
      properties:
        total_users:
          type: integer
        total_workspaces:
          type: integer
        active_subscriptions:
          type: object
          additionalProperties:
            type: integer

    AdminUser:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        workspace_id:
          type: string
          format: uuid
        tier:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    AdminUserDetail:
      allOf:
        - $ref: '#/components/schemas/AdminUser'
        - type: object
          properties:
            counters:
              $ref: '#/components/schemas/WorkspaceCounters'
            entitlement:
              $ref: '#/components/schemas/Entitlement'

    AdminWorkspaceUsage:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        counters:
          $ref: '#/components/schemas/WorkspaceCounters'
        limits:
          $ref: '#/components/schemas/EntitlementLimits'

paths:
  # --- Health ---
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /ready:
    get:
      tags: [Health]
      summary: Readiness check (DB + Redis)
      security: []
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus text format

  # --- Auth ---
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                data:
                  type: object
                  properties:
                    display_name:
                      type: string
                    referral_code:
                      type: string
              required: [email, password]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: JWT tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required: [refresh_token]
      responses:
        '200':
          description: New tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate token)
      security: []
      responses:
        '200':
          description: Logged out

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password recovery email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required: [email]
      responses:
        '200':
          description: Recovery email sent

