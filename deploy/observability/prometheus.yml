global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: widia-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: widia-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9090"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
