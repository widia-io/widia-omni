server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: widia-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: widia-api
          service: api
          __path__: /var/log/widia/api/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            env: env
      - labels:
          level:
          service:
          env:

  - job_name: widia-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: widia-worker
          service: worker
          __path__: /var/log/widia/worker/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            env: env
      - labels:
          level:
          service:
          env:
